<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- dark background -->
  <rect width="32" height="32" rx="5" fill="#0e0f0c"/>
  <!-- signal line (behind dot) -->
  <line x1="2" y1="16" x2="30" y2="16" stroke="#1e3322" stroke-width="1.5"/>
  <!-- dot -->
  <circle cx="16" cy="16" r="9" fill="#52a05e"/>
  <!-- line continuation through dot (subtle) -->
  <line x1="2" y1="16" x2="30" y2="16" stroke="#0e0f0c" stroke-width="1" stroke-opacity="0.35"/>
</svg>
